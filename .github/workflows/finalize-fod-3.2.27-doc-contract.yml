name: Finalize FOD 3.2.27 duplicate-set documentation

on:
  push:
    branches:
      - agent/fod-3.2.27-duplicate-set-show
    paths:
      - .github/workflows/finalize-fod-3.2.27-doc-contract.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-fod-3.2.27-doc-contract.yml

permissions:
  contents: write

jobs:
  correct-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/fod-3.2.27-duplicate-set-show
          fetch-depth: 0
          show-progress: false

      - name: Correct documented JSON shape
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          read_api = Path("docs/fod-indexer-read-api.md")
          text = read_api.read_text(encoding="utf-8")
          old = (
              "including the set header, canonical file id, saved-byte estimate, and deterministically\n"
              "ordered members with stable file ids, source metadata, logical and source paths,\n"
              "size, hash metadata, and canonical-member status."
          )
          new = (
              "a `duplicate_set` header plus deterministically ordered `members`. Member records\n"
              "include stable file ids, source metadata, logical and source paths, size, hash\n"
              "metadata, and canonical-member status."
          )
          if text.count(old) != 1:
              raise SystemExit("read API contract target is not unique")
          read_api.write_text(text.replace(old, new, 1), encoding="utf-8")

          requests = Path("docs/msfind-fod-indexer-requests.md")
          text = requests.read_text(encoding="utf-8")
          start = text.index("## Delivered P0: show one existing duplicate set with members")
          end = text.index("## Delivered P0: list or search the whole file index", start)
          section = text[start:end]
          if section.count("  duplicate_set_id\n") != 1:
              raise SystemExit("duplicate set id field target is not unique")
          if section.count("canonical_file_id\nsaved_bytes\n") != 1:
              raise SystemExit("obsolete duplicate set fields target is not unique")
          section = section.replace("  duplicate_set_id\n", "  id_duplicate_set\n", 1)
          section = section.replace("canonical_file_id\nsaved_bytes\n", "", 1)
          requests.write_text(text[:start] + section + text[end:], encoding="utf-8")
          PY

          git diff --check

      - name: Commit corrected contract
        shell: bash
        run: |
          rm .github/workflows/finalize-fod-3.2.27-doc-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/fod-indexer-read-api.md \
            docs/msfind-fod-indexer-requests.md \
            .github/workflows/finalize-fod-3.2.27-doc-contract.yml
          git commit -m "FOD 3.2.27: correct duplicate-set show contract"
          make test-version
          git push origin HEAD:agent/fod-3.2.27-duplicate-set-show
