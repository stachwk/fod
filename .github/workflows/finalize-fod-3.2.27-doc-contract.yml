name: Finalize FOD 3.2.27 duplicate-set documentation

on:
  push:
    branches:
      - agent/fod-3.2.27-duplicate-set-show
    paths:
      - .github/workflows/finalize-fod-3.2.27-doc-contract.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-fod-3.2.27-doc-contract.yml

permissions:
  contents: write

jobs:
  correct-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/fod-3.2.27-duplicate-set-show
          fetch-depth: 0
          show-progress: false

      - name: Correct documented JSON shape
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          read_api = Path("docs/fod-indexer-read-api.md")
          lines = read_api.read_text(encoding="utf-8").splitlines()
          matches = [
              index
              for index, line in enumerate(lines)
              if "including the set header, canonical file id, saved-byte estimate" in line
          ]
          if len(matches) != 1:
              raise SystemExit(f"read API description matches: {len(matches)}")
          index = matches[0]
          lines[index : index + 3] = [
              "a `duplicate_set` header plus deterministically ordered `members`. Member records",
              "include stable file ids, source metadata, logical and source paths, size, hash",
              "metadata, and canonical-member status.",
          ]
          read_api.write_text("\n".join(lines) + "\n", encoding="utf-8")

          requests = Path("docs/msfind-fod-indexer-requests.md")
          lines = requests.read_text(encoding="utf-8").splitlines()
          start = lines.index("## Delivered P0: show one existing duplicate set with members")
          end = lines.index("## Delivered P0: list or search the whole file index", start)
          id_matches = [
              index
              for index in range(start, end)
              if lines[index].strip() == "duplicate_set_id"
          ]
          if len(id_matches) != 1:
              raise SystemExit(f"duplicate set id field matches: {len(id_matches)}")
          lines[id_matches[0]] = "  id_duplicate_set"

          removed = []
          for field in ("canonical_file_id", "saved_bytes"):
              matches = [
                  index
                  for index in range(start, end)
                  if lines[index].strip() == field
              ]
              if len(matches) != 1:
                  raise SystemExit(f"{field} matches: {len(matches)}")
              removed.append(matches[0])
          for index in sorted(removed, reverse=True):
              del lines[index]
          requests.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          git diff --check

      - name: Commit corrected contract
        shell: bash
        run: |
          rm .github/workflows/finalize-fod-3.2.27-doc-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/fod-indexer-read-api.md \
            docs/msfind-fod-indexer-requests.md \
            .github/workflows/finalize-fod-3.2.27-doc-contract.yml
          git commit -m "FOD 3.2.27: correct duplicate-set show contract"
          make test-version
          git push origin HEAD:agent/fod-3.2.27-duplicate-set-show
