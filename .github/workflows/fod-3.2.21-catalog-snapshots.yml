name: FOD 3.2.21 catalogue snapshots

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  implement-and-test:
    if: github.head_ref == 'work/fod-3.2.21-catalog-snapshots' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/fod-3.2.21-catalog-snapshots
          fetch-depth: 0

      - name: Apply integration or focused correction
        run: |
          set -euo pipefail
          if grep -qx '3.2.21' fod_version.txt; then
            python3 - <<'PY'
          from pathlib import Path
          path = Path('rust_indexer/src/cli.rs')
          text = path.read_text()
          old = 'command: FileCommands::Show { id },'
          if old not in text:
              raise SystemExit('expected legacy FileCommands::Show test pattern')
          path.write_text(text.replace(old, 'command: FileCommands::Show { id, .. },', 1))
          PY
            rm -f .github/fod-3.2.21-validation.log
          else
            python3 .github/scripts/implement_fod_3_2_21.py
          fi

      - name: Persist formatted implementation
        run: |
          set -euo pipefail
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix FOD 3.2.21 snapshot CLI validation"
          git push origin HEAD:work/fod-3.2.21-catalog-snapshots

      - name: Validate and preserve diagnostics
        run: |
          set +e
          {
            cargo fmt --all -- --check &&
            cargo check --workspace &&
            cargo check --workspace --locked &&
            cargo test --locked -p fod-rust-indexer &&
            cargo test --locked -p fod-rust-mkfs &&
            make test-version &&
            git diff --check
          } > /tmp/fod-3.2.21-validation.log 2>&1
          rc=$?
          cat /tmp/fod-3.2.21-validation.log
          if [ "$rc" -ne 0 ]; then
            cp /tmp/fod-3.2.21-validation.log .github/fod-3.2.21-validation.log
            git add .github/fod-3.2.21-validation.log
            git commit -m "Record FOD 3.2.21 validation failure"
            git push origin HEAD:work/fod-3.2.21-catalog-snapshots
            exit "$rc"
          fi

      - name: Commit validated implementation
        run: |
          set -euo pipefail
          rm -f .github/workflows/fod-3.2.21-catalog-snapshots.yml
          rm -f .github/scripts/implement_fod_3_2_21.py
          rm -f .github/fod-3.2.21-validation.log
          git add -A
          git commit -m "Finalize FOD 3.2.21 catalogue snapshots"
          git push origin HEAD:work/fod-3.2.21-catalog-snapshots
