name: FOD 3.2.21 catalogue snapshots

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  implement-and-test:
    if: github.head_ref == 'work/fod-3.2.21-catalog-snapshots' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/fod-3.2.21-catalog-snapshots
          fetch-depth: 0

      - name: Apply integration patch
        run: python3 .github/scripts/implement_fod_3_2_21.py

      - name: Format and validate
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          cargo check --workspace
          cargo check --workspace --locked
          cargo test --locked -p fod-rust-indexer
          cargo test --locked -p fod-rust-mkfs
          make test-version
          git diff --check

      - name: Commit validated implementation
        run: |
          set -euo pipefail
          rm -f .github/workflows/fod-3.2.21-catalog-snapshots.yml
          rm -f .github/scripts/implement_fod_3_2_21.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "FOD 3.2.21: add immutable catalogue snapshots"
          git push origin HEAD:work/fod-3.2.21-catalog-snapshots
