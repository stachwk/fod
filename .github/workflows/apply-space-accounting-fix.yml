name: Apply FOD space accounting fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix-space-accounting
          fetch-depth: 0

      - name: Apply source and TODO updates
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          fs_path = Path("rust_fuse/src/fs.rs")
          fs_text = fs_path.read_text()
          pattern = re.compile(
              r'    fn block_count\(&self, size: u64, kind: &str\) -> u64 \{\n'
              r'        if kind == "dir" \{\n'
              r'            return 1;\n'
              r'        \}\n'
              r'        let block_size = self\.block_size\.max\(1\);\n'
              r'        1 \+ size\.saturating_sub\(1\) / block_size\n'
              r'    \}\n'
          )
          replacement = (
              '    fn block_count(&self, size: u64, kind: &str) -> u64 {\n'
              '        if kind == "dir" {\n'
              '            return 1;\n'
              '        }\n'
              '        if size == 0 {\n'
              '            return 0;\n'
              '        }\n'
              '        // POSIX st_blocks is always expressed in 512-byte units. It is\n'
              '        // independent of the FOD storage block size exposed as st_blksize.\n'
              '        const STAT_BLOCK_BYTES: u64 = 512;\n'
              '        1 + size.saturating_sub(1) / STAT_BLOCK_BYTES\n'
              '    }\n'
          )
          fs_text, replacements = pattern.subn(replacement, fs_text, count=1)
          if replacements != 1:
              raise SystemExit(f"expected one legacy block_count implementation, got {replacements}")
          fs_path.write_text(fs_text)

          todo_path = Path("TODO.md")
          todo_text = todo_path.read_text()
          anchor = "  - Add an integration regression using the reported shape (several large logical files with much smaller database-backed allocation) and assert the documented relationship between `ls`, apparent `du`, allocated `du`, and `df` rather than requiring all values to be identical.\n"
          note = "  - Implementation note (2026-07-13): `FileAttr.blocks` now uses the mandatory POSIX 512-byte unit instead of the FOD storage block size, which removes the approximately eightfold `du` under-reporting seen with a 4 KiB FOD block size. `df` intentionally remains unique physical payload accounting over `data_blocks` and `data_extents`; mounted validation of the reported production case remains pending.\n"
          if todo_text.count(anchor) != 1:
              raise SystemExit("expected exactly one space-accounting TODO anchor")
          if note not in todo_text:
              todo_text = todo_text.replace(anchor, anchor + note, 1)
          todo_path.write_text(todo_text)
          PY

          chmod +x scripts/fod-space-accounting.sh
          cargo fmt --all

      - name: Remove one-shot workflow and commit
        shell: bash
        run: |
          git rm .github/workflows/apply-space-accounting-fix.yml
          git add rust_fuse/src/fs.rs TODO.md scripts/fod-space-accounting.sh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "FOD 3.2.1: fix POSIX file block accounting"
          git push origin HEAD:fix-space-accounting
