              assert_eq!(payload["probe_only"], true);
              assert_eq!(payload["endpoint_count"], 1);
              assert_eq!(payload["reachable_count"], 1);
              assert_eq!(payload["failed_count"], 0);
              assert_eq!(payload["all_probes_succeeded"], true);
