          todo_notes = todo_anchor + "\n  - Implementation note (2026-07-21, FOD 3.2.23): phase 1 added explicit and discovery endpoint configuration plus `fod-config endpoint-config`; runtime traffic still uses legacy `host` and `port`.\n  - Implementation note (2026-07-21, FOD 3.2.24): phase 2 moved the endpoint model into `fod-rust-runtime` and added live `fod-config endpoint-probe` classification using `pg_is_in_recovery()` and `transaction_read_only`; probe results remain diagnostics-only and routing is still disabled."
          if todo_text.count(todo_anchor) != 1:
              raise SystemExit("TODO multi-endpoint anchor changed")
          todo.write_text(todo_text.replace(todo_anchor, todo_notes), encoding="utf-8")

          version_file = Path("fod_version.txt")
