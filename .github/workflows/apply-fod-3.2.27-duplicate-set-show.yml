name: Apply FOD 3.2.27 duplicate-set show

on:
  push:
    branches:
      - agent/fod-3.2.27-duplicate-set-show
    paths:
      - .github/workflows/apply-fod-3.2.27-duplicate-set-show.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-fod-3.2.27-duplicate-set-show.yml

permissions:
  contents: write

concurrency:
  group: apply-fod-3.2.27-duplicate-set-show
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/fod-3.2.27-duplicate-set-show
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: bash
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0

      - name: Apply implementation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "rust_indexer/src/cli.rs",
              '''    #[command(
                  about = "Inspect stored duplicate sets.",
                  long_about = "List existing duplicate-set metadata without rebuilding it.

          This command is strictly read-only. It reads index_duplicate_sets in stable id order and does not scan sources, hash files, refresh duplicate metadata, create plans, or materialize data."
              )]
          ''',
              '''    #[command(
                  about = "List or inspect stored duplicate sets.",
                  long_about = "List existing duplicate-set metadata or show one stored set with its member files without rebuilding it.

          These commands are strictly read-only. They read existing duplicate metadata and do not scan sources, hash files, refresh duplicate metadata, create plans, or materialize data."
              )]
          ''',
          )

          replace_once(
              "rust_indexer/src/cli.rs",
              '''    List {
                  #[arg(long, default_value_t = 100)]
                  limit: usize,
                  #[arg(long)]
                  cursor: Option<u64>,
              },
          }
          ''',
              '''    List {
                  #[arg(long, default_value_t = 100)]
                  limit: usize,
                  #[arg(long)]
                  cursor: Option<u64>,
              },
              #[command(
                  about = "Show one stored duplicate set.",
                  long_about = "Show one existing duplicate set and its indexed member files by stable duplicate-set id.

          The command is strictly read-only and does not rebuild duplicate metadata. It is the structured duplicate-set equivalent of the compatibility command report duplicates --id."
              )]
              Show {
                  #[arg(long)]
                  id: u64,
              },
          }
          ''',
          )

          replace_once(
              "rust_indexer/src/cli.rs",
              '''    #[test]
              fn parses_file_list_filters() {
          ''',
              '''    #[test]
              fn parses_duplicate_set_show_id() {
                  let cli = Cli::try_parse_from([
                      "fod-indexer",
                      "--output",
                      "json",
                      "duplicate-set",
                      "show",
                      "--id",
                      "17",
                  ])
                  .expect("duplicate-set show command should parse");
                  assert_eq!(cli.output, OutputFormat::Json);
                  match cli.command {
                      Commands::DuplicateSet {
                          command: DuplicateSetCommands::Show { id },
                      } => assert_eq!(id, 17),
                      _ => panic!("expected duplicate-set show command"),
                  }
              }

              #[test]
              fn parses_file_list_filters() {
          ''',
          )

          replace_once(
              "rust_indexer/src/main.rs",
              '''            DuplicateSetCommands::List { limit, cursor } => {
                          let sets = duplicate_set_api::load_duplicate_set_list(&repo, limit, cursor)?;
                          if output.is_json() {
                              print_json(&sets)?;
                          } else {
                              println!("{}", sets.human_readable());
                          }
                          Ok(())
                      }
          ''',
              '''            DuplicateSetCommands::List { limit, cursor } => {
                          let sets = duplicate_set_api::load_duplicate_set_list(&repo, limit, cursor)?;
                          if output.is_json() {
                              print_json(&sets)?;
                          } else {
                              println!("{}", sets.human_readable());
                          }
                          Ok(())
                      }
                      DuplicateSetCommands::Show { id } => {
                          let snapshot = plan::load_duplicate_set_snapshot(&repo, id)?;
                          if output.is_json() {
                              print_json(&snapshot)?;
                          } else {
                              println!("FOD indexer duplicate set");
                              println!("{}", snapshot.human_readable());
                          }
                          Ok(())
                      }
          ''',
          )

          replace_once(
              "rust_indexer/src/output.rs",
              '''                CommandCapabilityView {
                              command: "report duplicates --id",
          ''',
              '''                CommandCapabilityView {
                              command: "duplicate-set show --id",
                              status: "available",
                              read_only: true,
                              filters: &["id"],
                              sort: &["members: source_id,path-length,path"],
                              pagination: None,
                              default_limit: None,
                              max_limit: None,
                              consistency: "stored-derived-state",
                              notes: "Reads one existing duplicate set and its member files without rebuilding duplicate tables.",
                          },
                          CommandCapabilityView {
                              command: "report duplicates --id",
          ''',
          )

          replace_once(
              "rust_indexer/src/output.rs",
              '                    notes: "Reads one existing duplicate set without rebuilding duplicate tables.",\n',
              '                    notes: "Compatibility alias for duplicate-set show --id; reads one existing set without rebuilding duplicate tables.",\n',
          )

          replace_once(
              "rust_indexer/src/duplicate_set_api.rs",
              '''    #[test]
              fn exposes_duplicate_set_list_as_available_capability() {
                  let capabilities = capabilities_output();
                  let command = capabilities
                      .commands
                      .iter()
                      .find(|command| command.command == "duplicate-set list")
                      .expect("duplicate-set capability should exist");
                  assert_eq!(command.status, "available");
                  assert!(command.read_only);
              }
          }
          ''',
              '''    #[test]
              fn exposes_duplicate_set_list_as_available_capability() {
                  let capabilities = capabilities_output();
                  let command = capabilities
                      .commands
                      .iter()
                      .find(|command| command.command == "duplicate-set list")
                      .expect("duplicate-set capability should exist");
                  assert_eq!(command.status, "available");
                  assert!(command.read_only);
              }

              #[test]
              fn exposes_duplicate_set_show_as_available_capability() {
                  let capabilities = capabilities_output();
                  let command = capabilities
                      .commands
                      .iter()
                      .find(|command| command.command == "duplicate-set show --id")
                      .expect("duplicate-set show capability should exist");
                  assert_eq!(command.status, "available");
                  assert!(command.read_only);
                  assert_eq!(command.consistency, "stored-derived-state");
              }
          }
          ''',
          )

          replace_once(
              "docs/fod-indexer-read-api.md",
              '''### `report duplicates --id ID`

          Reads one existing duplicate set. It does not rebuild duplicate metadata.

          ''',
              '',
          )

          replace_once(
              "docs/fod-indexer-read-api.md",
              '''Each item contains the stable duplicate-set id, hash algorithm, full hash, file
          size, file count, total bytes, and creation/update timestamps. The consistency
          model is `live`.

          ### `file list`
          ''',
              '''Each item contains the stable duplicate-set id, hash algorithm, full hash, file
          size, file count, total bytes, and creation/update timestamps. The consistency
          model is `live`.

          ### `duplicate-set show --id ID`

          ```text
          fod-indexer duplicate-set show --id ID
          ```

          Reads one existing duplicate set and its indexed member files without rebuilding
          duplicate metadata. The response uses the existing duplicate-set snapshot shape,
          including the set header, canonical file id, saved-byte estimate, and deterministically
          ordered members with stable file ids, source metadata, logical and source paths,
          size, hash metadata, and canonical-member status.

          The older command below remains available as a compatibility alias:

          ```text
          fod-indexer report duplicates --id ID
          ```

          ### `file list`
          ''',
          )

          replace_once(
              "docs/msfind-fod-indexer-requests.md",
              '''`msfind` can use this command to discover valid set ids without calling the
          refreshing no-id `report duplicates` path.

          ## Delivered P0: list or search the whole file index
          ''',
              '''`msfind` can use this command to discover valid set ids without calling the
          refreshing no-id `report duplicates` path.

          ## Delivered P0: show one existing duplicate set with members

          The strictly read-only command is available:

          ```text
          fod-indexer duplicate-set show --id ID
          ```

          It reads one stored duplicate set without rebuilding duplicate metadata. The
          versioned response contains:

          ```text
          schema_version
          producer
          duplicate_set
            duplicate_set_id
            hash_algorithm
            full_hash_hex
            file_size
            file_count
            total_bytes
          canonical_file_id
          saved_bytes
          members:
            file_id
            source_id
            source_name
            source_kind
            source_root_path
            logical_path
            source_path
            size
            hash_algorithm
            full_hash_hex
            hash_status
            is_canonical
          ```

          `report duplicates --id ID` remains a compatibility alias. New consumers should
          use the `duplicate-set` command family for both discovery and detail retrieval.

          ## Delivered P0: list or search the whole file index
          ''',
          )
          PY
          cargo fmt --all
          cargo check -p fod-rust-indexer

      - name: Validate implementation
        shell: bash
        run: |
          git diff --check
          cargo fmt --all -- --check
          RUSTFLAGS="-D warnings" cargo check --locked -p fod-rust-indexer
          RUSTFLAGS="-D warnings" cargo test --locked -p fod-rust-indexer

      - name: Commit implementation
        shell: bash
        run: |
          rm .github/patches/fod-3.2.27-duplicate-set-show.patch
          rm .github/workflows/apply-fod-3.2.27-duplicate-set-show.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock Cargo.toml fod_version.txt \
            rust_indexer/src/cli.rs \
            rust_indexer/src/main.rs \
            rust_indexer/src/output.rs \
            rust_indexer/src/duplicate_set_api.rs \
            docs/fod-indexer-read-api.md \
            docs/msfind-fod-indexer-requests.md \
            .github/patches/fod-3.2.27-duplicate-set-show.patch \
            .github/workflows/apply-fod-3.2.27-duplicate-set-show.yml
          git commit -m "FOD 3.2.27: add duplicate-set show command"
          make test-version
          git push origin HEAD:agent/fod-3.2.27-duplicate-set-show
