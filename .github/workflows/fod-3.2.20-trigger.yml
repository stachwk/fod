name: FOD 3.2.20 implementation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'work/fod-3.2.20-file-read' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/fod-3.2.20-file-read
          fetch-depth: 0

      - name: Apply implementation
        run: |
          python3 -c "from pathlib import Path; p=Path('.github/scripts/implement_fod_3_2_20.py'); t=p.read_text(); p.write_text(t.replace(\"    '''    #[test]\", \"    r'''    #[test]\", 1))"
          python3 .github/scripts/implement_fod_3_2_20.py

      - name: Persist formatted implementation
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo check --workspace || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.toml Cargo.lock fod_version.txt rust_indexer
          git commit -m "Apply FOD 3.2.20 file read implementation"
          git push origin HEAD:work/fod-3.2.20-file-read

      - name: Validate
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo check --workspace --locked
          cargo test --locked -p fod-rust-indexer
          make test-version

      - name: Remove temporary implementation files
        run: |
          set -euo pipefail
          rm -f .github/workflows/fod-3.2.20-file-read.yml
          rm -f .github/workflows/fod-3.2.20-trigger.yml
          rm -f .github/scripts/implement_fod_3_2_20.py
          rm -f .github/fod-3.2.20-trigger
          git add -A
          git commit -m "Finalize FOD 3.2.20 file read branch"
          git push origin HEAD:work/fod-3.2.20-file-read
