name: Finalize FOD 3.2.27 duplicate-set show

on:
  push:
    branches:
      - agent/fod-3.2.27-duplicate-set-show
    paths:
      - .github/workflows/finalize-fod-3.2.27-duplicate-set-show.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-fod-3.2.27-duplicate-set-show.yml

permissions:
  contents: write

concurrency:
  group: finalize-fod-3.2.27-duplicate-set-show
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/fod-3.2.27-duplicate-set-show
          fetch-depth: 0
          show-progress: false

      - name: Install Rust 1.85 with rustfmt
        shell: bash
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt
          rustup default 1.85.0

      - name: Apply guarded implementation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-fod-3.2.27-duplicate-set-show.yml')
          lines = workflow.read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if "python3 - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          script_lines = []
          for line in lines[start:end]:
              script_lines.append(line[10:] if line.startswith('          ') else line)
          script = Path('/tmp/apply_duplicate_set_show.py')
          script.write_text('\n'.join(script_lines) + '\n', encoding='utf-8')
          print(f'extracted_lines={len(script_lines)}')
          PY
          python3 /tmp/apply_duplicate_set_show.py
          cargo fmt --all
          cargo check -p fod-rust-indexer

      - name: Validate implementation
        shell: bash
        run: |
          git diff --check
          cargo fmt --all -- --check
          RUSTFLAGS="-D warnings" cargo check --locked -p fod-rust-indexer
          RUSTFLAGS="-D warnings" cargo test --locked -p fod-rust-indexer

      - name: Commit validated implementation
        shell: bash
        run: |
          rm .github/patches/fod-3.2.27-duplicate-set-show.patch
          rm .github/workflows/apply-fod-3.2.27-duplicate-set-show.yml
          rm .github/workflows/diagnose-fod-3.2.27-duplicate-set-show.yml
          rm .github/workflows/finalize-fod-3.2.27-duplicate-set-show.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock Cargo.toml fod_version.txt \
            rust_indexer/src/cli.rs \
            rust_indexer/src/main.rs \
            rust_indexer/src/output.rs \
            rust_indexer/src/duplicate_set_api.rs \
            docs/fod-indexer-read-api.md \
            docs/msfind-fod-indexer-requests.md \
            .github/patches/fod-3.2.27-duplicate-set-show.patch \
            .github/workflows/apply-fod-3.2.27-duplicate-set-show.yml \
            .github/workflows/diagnose-fod-3.2.27-duplicate-set-show.yml \
            .github/workflows/finalize-fod-3.2.27-duplicate-set-show.yml
          git commit -m "FOD 3.2.27: add duplicate-set show command"
          make test-version
          git push origin HEAD:agent/fod-3.2.27-duplicate-set-show
