# Local dev/test FOD config.
# For a shareable template, use fod_config.example.ini and change the password before installing to a shared host.
[database]
host = 127.0.0.1
port = 5432
dbname = foddbname
user = foduser
password = cichosza
#sslmode = require
#sslrootcert = /path/to/ca.crt
#sslcert = /etc/fod/.fod/tls/client.crt
#sslkey =  /etc/fod/.fod/tls/client.key

[fod]
# Canonical value-range rules live in rust_runtime/src/lib.rs.
# Balanced default for mixed metadata and moderate I/O workloads.
# pool_max_connections must be > 0 and controls the PostgreSQL connection budget used by the runtime.
pool_max_connections = 10
# Numeric storage/runtime knobs are non-negative unless noted otherwise.
synchronous_commit = on
# write_flush_threshold_bytes: >= 0; 0 disables auto-flush.
write_flush_threshold_bytes = 67108864
# max_fs_size_bytes: positive size or omitted; 0 is treated as no explicit cap.
max_fs_size_bytes = 10GiB
# Optional override for what PostgreSQL can actually see on disk.
# If unset, FOD tries SHOW data_directory and statvfs() on that path.
# pg_visible_path = /var/lib/postgresql/data/pgdata
read_cache_blocks = 4096
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 8
workers_read = 4
workers_read_min_blocks = 8
workers_write = 4
workers_write_min_blocks = 8
# persist_buffer_chunk_blocks must be > 0.
persist_buffer_chunk_blocks = 128
# persist_block_transport selects how file block batches are written:
# copy_binary_staging (default), binary_bytea, or legacy_hex.
persist_block_transport = copy_binary_staging
# Disable to improve sequential write throughput; enable to bypass kernel page cache.
fopen_direct_io = false
fuse_writeback_cache = false
# Copy dedupe controls: enable changed-block skipping during copy_file_range().
copy_dedupe_enabled = false
# Lower gate: >= 0; 0 behaves like 1 block.
copy_dedupe_min_blocks = 16
# Optional upper cap: >= 0; 0 disables the cap.
copy_dedupe_max_blocks = 0
# Optional CRC cache for unchanged-block detection. Populated on demand and stored in PostgreSQL.
copy_dedupe_crc_table = false
# Most Rust hot-path work now goes through the Rust backend; env vars can still force the Rust path off for comparison.
# Copy dedupe stays opt-in because it can slow writes down substantially on some workloads.
# Extents are opt-in only; keep them off unless a benchmarked workload explicitly enables them.
enable_extents = false
# Rust hot-path persist padding is enabled by default via the Rust backend; env vars can still force it off for comparison.
# Rust hot-path read assembly is enabled by default via the Rust backend; env vars can still force it off for comparison.
# Cache TTLs: >= 0; 0 disables the cache.
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 2
lock_backend = postgres_lease
# PostgreSQL-backed leases are shared across hosts on primary mounts; replicas fall back to in-memory.
# Writable primary mounts also keep a client_sessions heartbeat row so PostgreSQL can reap stale lock state after TTL via session_id-scoped trigger cleanup.
# lock_lease_ttl_seconds, lock_heartbeat_interval_seconds, and lock_poll_interval_seconds must be > 0.
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1

[fod.profile.bulk_write]
# Best for ingest, large sequential copies, throughput runs, and remount durability checks.
write_flush_threshold_bytes = 268435456
read_cache_blocks = 1024
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 8
workers_read = 4
workers_read_min_blocks = 8
workers_write = 8
workers_write_min_blocks = 16
persist_buffer_chunk_blocks = 512
copy_dedupe_enabled = false
copy_dedupe_max_blocks = 0
copy_dedupe_crc_table = false
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 1
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1
fopen_direct_io = false
fuse_writeback_cache = false

[fod.profile.metadata_heavy]
# Best for ls/find/stat-heavy browsing and deep tree inspection.
write_flush_threshold_bytes = 67108864
read_cache_blocks = 2048
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 16
workers_read = 2
workers_read_min_blocks = 16
workers_write = 2
workers_write_min_blocks = 16
persist_buffer_chunk_blocks = 64
copy_dedupe_enabled = false
copy_dedupe_crc_table = false
metadata_cache_ttl_seconds = 10
statfs_cache_ttl_seconds = 10
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1
fopen_direct_io = false
fuse_writeback_cache = false

[fod.profile.pg_locking]
# Best for multi-client coordination and lock regression testing.
workers_read = 1
workers_read_min_blocks = 16
workers_write = 1
workers_write_min_blocks = 16
persist_buffer_chunk_blocks = 64
copy_dedupe_enabled = false
copy_dedupe_crc_table = false
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 1
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.05
fopen_direct_io = false
fuse_writeback_cache = false

[fod.profile.extents]
# Opt-in sequential-only extent PoC preset.
enable_extents = true
