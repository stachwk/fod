# Optional helper for FOD test runs when the admpanch_trace PostgreSQL sink is available.
# Trace only FOD binaries and write the events to the local trace database.

[pg_server]
type=postgres
host=localhost
port=5432
dbname=trace
user=trace
password=trace123

[db_logger]
server=pg_server

[trace]
ADMP_LOG=0
ADMP_DEBUG=0
ADMP_DB=1
ADMP_TRACE=1
ADMP_NET=0
ADMP_MONITOR_PROGRAMS=fod-bootstrap,fod-rust-mkfs,fod-config,fod-change,mkfs.fod,fod-rust-fuse
ADMP_EXCLUDE_PROGRAMS=valgrind,memcheck-amd64-linux,callgrind,cachegrind,helgrind,drd,massif
ADMP_MONITOR_FUNCTIONS=open,close,read,write,fopen,fclose,fread,fwrite
ADMP_MONITOR_NETWORK_FUNCTIONS=connect,send,recv,getaddrinfo
