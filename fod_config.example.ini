# Shareable FOD config example.
# Copy this to fod_config.ini for local testing, then replace the password before installing anywhere shared.

[database]
host = 127.0.0.1
port = 5432
dbname = foddbname
user = foduser
password = change-me
#sslmode = require
#sslrootcert = /path/to/ca.crt
#sslcert = /etc/fod/.fod/tls/client.crt
#sslkey =  /etc/fod/.fod/tls/client.key

[fod]
# Canonical value-range rules live in rust_runtime/src/lib.rs.
pool_max_connections = 10
synchronous_commit = on
write_flush_threshold_bytes = 67108864
max_fs_size_bytes = 10GiB
read_cache_blocks = 1024
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 8
workers_read = 4
workers_read_min_blocks = 8
workers_write = 4
workers_write_min_blocks = 8
persist_buffer_chunk_blocks = 128
# persist_block_transport selects how file block batches are written:
# copy_binary_staging (default), binary_bytea, or legacy_hex.
persist_block_transport = copy_binary_staging
# Disable to improve sequential write throughput; enable to bypass kernel page cache.
fopen_direct_io = false
fuse_writeback_cache = false
copy_dedupe_enabled = false
copy_dedupe_min_blocks = 16
copy_dedupe_max_blocks = 0
copy_dedupe_crc_table = false
# Extents are opt-in only; keep them off unless a benchmarked workload explicitly enables them.
enable_extents = false
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 2
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1
fopen_direct_io = false

[fod.profile.extents]
# Opt-in sequential-only extent PoC preset.
enable_extents = true

[fod-indexer]
# Skip hidden dotfiles and dot-directories by default.
skip_hidden = true
# Extra exact component names to skip even when they are not hidden.
skip_components = cache,caches,build,dist,node_modules,target,tmp,temp,out,__pycache__
# Extra nested path prefixes to skip. Values with / or \ are treated as prefixes.
# skip_prefixes = Android/data/com.example/cache,work/tmp
# Convenience alias that accepts either component names or nested prefixes.
# skip_paths = .venv,node_modules,work/cache
