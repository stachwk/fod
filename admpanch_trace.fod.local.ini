# Optional helper for FOD test runs.
# Trace only FOD binaries and keep the tracer local/stderr-only.
# Use with:
#   ADMP_INI=$PWD/admpanch_trace.fod.local.ini \
#   LD_PRELOAD=/path/to/libadmpanch_trace.so \
#   make test-fio-sequential-io-strace

[trace]
ADMP_LOG=1
ADMP_DEBUG=0
ADMP_DB=0
ADMP_TRACE=1
ADMP_NET=0
ADMP_MONITOR_PROGRAMS=fod-bootstrap,fod-rust-mkfs,fod-config,fod-change,mkfs.fod,fod-rust-fuse
ADMP_EXCLUDE_PROGRAMS=valgrind,memcheck-amd64-linux,callgrind,cachegrind,helgrind,drd,massif
ADMP_MONITOR_FUNCTIONS=open,close,read,write,fopen,fclose,fread,fwrite
ADMP_MONITOR_NETWORK_FUNCTIONS=connect,send,recv,getaddrinfo
