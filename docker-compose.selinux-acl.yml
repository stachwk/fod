services:
  postgres:
    image: postgres:16-alpine
    container_name: ${CONTAINER_POSTGRES_SELINUX_ACL_NAME:-fod-postgres-selinux-acl}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -- /usr/local/bin/docker-entrypoint.sh postgres -c "shared_preload_libraries=${POSTGRES_SHARED_PRELOAD_LIBRARIES:-pg_stat_statements}"
        [ -n "${POSTGRES_SHARED_BUFFERS:-}" ] && set -- "$@" -c "shared_buffers=${POSTGRES_SHARED_BUFFERS}"
        [ -n "${POSTGRES_MAX_CONNECTIONS:-}" ] && set -- "$@" -c "max_connections=${POSTGRES_MAX_CONNECTIONS}"
        [ -n "${POSTGRES_MAX_WAL_SIZE:-}" ] && set -- "$@" -c "max_wal_size=${POSTGRES_MAX_WAL_SIZE}"
        [ -n "${POSTGRES_CHECKPOINT_TIMEOUT:-}" ] && set -- "$@" -c "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT}"
        [ -n "${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-}" ] && set -- "$@" -c "checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET}"
        [ -n "${POSTGRES_WAL_COMPRESSION:-}" ] && set -- "$@" -c "wal_compression=${POSTGRES_WAL_COMPRESSION}"
        [ -n "${POSTGRES_RANDOM_PAGE_COST:-}" ] && set -- "$@" -c "random_page_cost=${POSTGRES_RANDOM_PAGE_COST}"
        [ -n "${POSTGRES_EFFECTIVE_CACHE_SIZE:-}" ] && set -- "$@" -c "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE}"
        [ -n "${POSTGRES_MAINTENANCE_WORK_MEM:-}" ] && set -- "$@" -c "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM}"
        [ -n "${POSTGRES_AUTOVACUUM_MAX_WORKERS:-}" ] && set -- "$@" -c "autovacuum_max_workers=${POSTGRES_AUTOVACUUM_MAX_WORKERS}"
        [ -n "${POSTGRES_AUTOVACUUM_WORK_MEM:-}" ] && set -- "$@" -c "autovacuum_work_mem=${POSTGRES_AUTOVACUUM_WORK_MEM}"
        exec "$@"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foddbname}
      POSTGRES_USER: ${POSTGRES_USER:-foduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cichosza}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fod_pgdata_selinux_acl:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  fod-selinux-acl:
    build:
      context: .
      dockerfile: docker/selinux-acl/Dockerfile
    container_name: ${CONTAINER_FOD_SELINUX_ACL_NAME:-fod-selinux-acl}
    depends_on:
      postgres:
        condition: service_healthy
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor=unconfined
      - label=disable
    environment:
      FOD_CONFIG: /workspace/fod/fod_config.ini
      FOD_DSN_CONNINFO: host=postgres port=5432 dbname=${POSTGRES_DB:-foddbname} user=${POSTGRES_USER:-foduser} password=${POSTGRES_PASSWORD:-cichosza}
      FOD_ROLE: ${FOD_ROLE:-auto}
      FOD_PROFILE: ${FOD_PROFILE:-bulk_write}
      FOD_SELINUX: ${FOD_SELINUX:-on}
      FOD_ACL: ${FOD_ACL:-on}
      FOD_USE_FUSE_CONTEXT: "1"
      FOD_ALLOW_OTHER: ${FOD_ALLOW_OTHER:-1}
      FOD_LOG_LEVEL: ${FOD_LOG_LEVEL:-DEBUG}
    working_dir: /workspace/fod
    volumes:
      - .:/workspace/fod:rw
      - ./docker/selinux-acl/fod_config.ini:/workspace/fod/fod_config.ini:ro
      - fod_cargo_selinux_acl:/usr/local/cargo
      - fod_target_selinux_acl:/workspace/fod/target
    command: ["sleep", "infinity"]

volumes:
  fod_pgdata_selinux_acl:
  fod_cargo_selinux_acl:
  fod_target_selinux_acl:
